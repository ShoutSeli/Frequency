version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uwh
      POSTGRES_PASSWORD: uwh_password
      POSTGRES_DB: universal_watch_hub
    ports:
      - '5432:5432'
    volumes:
      - uwh_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  uwh_pg_data:
